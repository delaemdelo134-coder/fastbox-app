<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rostic's FastBox</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #ffffff; --card: #f5f5f5; --red: #e41c2d; --text: #000000; --gray: #8e8e8e; }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; -webkit-tap-highlight-color: transparent; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .header-left { display: flex; flex-direction: column; }
        .brand { font-weight: 900; font-size: 18px; color: var(--red); line-height: 1; }
        .address { font-size: 11px; font-weight: 600; color: var(--text); margin-top: 2px; }
        .service-name { font-weight: 800; font-size: 16px; color: var(--text); }

        .category-title { padding: 20px 15px 10px; font-size: 17px; font-weight: 600; color: #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: var(--card); border-radius: 20px; padding: 12px; display: flex; flex-direction: column; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; margin-bottom: 10px; }
        .price { font-size: 18px; font-weight: 800; }
        .name { font-size: 13px; font-weight: 500; height: 32px; overflow: hidden; }

        /* Модалка товара */
        #modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; z-index: 2000; }
        #modal { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 24px 24px 0 0; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; }
        .m-banner { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .m-content { padding: 20px; }
        .m-title { font-size: 24px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .m-info { font-size: 12px; color: var(--gray); line-height: 1.3; }
        .m-allergy { font-size: 11px; color: #b0b0b0; font-style: italic; margin-top: 5px; }
        .section-name { font-size: 16px; font-weight: 700; margin: 20px 0 10px; }
        .row-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .row-left { display: flex; align-items: center; gap: 12px; }
        .row-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .row-text { font-size: 14px; font-weight: 500; }
        .btn-fixed { background: #eee; color: #888; border: none; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .radio { width: 22px; height: 22px; border: 2px solid #ddd; border-radius: 50%; }
        .selected .radio { border-color: var(--red); background: var(--red); position: relative; }
        .selected .radio::after { content: ""; position: absolute; top: 5px; left: 5px; width: 8px; height: 8px; background: #fff; border-radius: 50%; }

        /* Нижняя плавающая корзина */
        .cart-float { 
            position: fixed; bottom: 20px; left: 15px; right: 15px; 
            background: var(--red); color: #fff; padding: 18px; 
            border-radius: 20px; display: none; justify-content: space-between; 
            align-items: center; font-weight: 800; font-size: 17px;
            box-shadow: 0 10px 30px rgba(228, 28, 45, 0.4); z-index: 1500;
        }

        .m-footer { padding: 15px 20px 30px; background: #fff; position: sticky; bottom: 0; }
        .add-to-cart { background: var(--red); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 800; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <span class="brand">ROSTIC'S</span>
        <span class="address">Советская</span>
    </div>
    <div class="service-name">FastBox</div>
</div>

<div class="category-title">Комбо и Ланчи</div>
<div id="grid" class="grid"></div>

<div class="cart-float" id="cart-float" onclick="sendOrder()">
    <span id="cart-total">0 ₽</span>
    <span>ОФОРМИТЬ ЗАКАЗ →</span>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div id="modal" onclick="event.stopPropagation()">
        <img id="m-img" class="m-banner" src="">
        <div class="m-content">
            <div class="m-title" id="m-title"></div>
            <div class="m-info">6 креветок + Картошка Фри стандартный + Напиток на выбор 0.4 л</div>
            <div class="m-allergy">*Продукция содержит или может содержать аллергены.</div>

            <div class="section-name">Состав</div>
            <div class="row-item">
                <div class="row-left"><img class="row-img" src="https://eda.yandex/images/13583683/ba2a6c0edebe0896ed40c3aa67e48739-400x400nocrop.jpeg"><div class="row-text">6 креветок</div></div>
                <button class="btn-fixed">ОБЯЗАТЕЛЬНО</button>
            </div>
            <div class="row-item">
                <div class="row-left"><img class="row-img" src="https://eda.yandex/images/18012291/6421bb9437d87a3ce2ba2465ccf7e594-400x400nocrop.jpeg"><div class="row-text">Картофель фри</div></div>
                <button class="btn-fixed">ОБЯЗАТЕЛЬНО</button>
            </div>

            <div class="section-name">Напиток 0.4</div>
            <div id="drink-list"></div>
        </div>
        <div class="m-footer">
            <button class="add-to-cart" onclick="addToBasket()">В корзину <span id="m-price"></span> ₽</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const drinks = [
        { n: "Эвервесс Кола 0,4 л", i: "https://eda.yandex/images/18155812/477fc31c7494d1d7ac4a7f095e1f4e06-400x400nocrop.jpeg" },
        { n: "Фрустайл Апельсин 0,4 л", i: "https://eda.yandex/images/17635794/2bcf653285701bb6a855174c1580df1f-400x400nocrop.jpeg" },
        { n: "Фрустайл Лимон-Лайм 0,4 л", i: "https://eda.yandex/images/18753459/624ced7ecf9f7dff6e12f46e8326d631-400x400nocrop.jpeg" },
        { n: "Эвервесс Кола Без Сахара 0,4 л", i: "https://eda.yandex/images/17752687/6ec9a979bbe48ff7b6f0846061c2caa2-400x400nocrop.jpeg" }
    ];

    const product = { n: "КОМБО С КРЕВЕТКАМИ", p: 556, i: "https://eda.yandex/images/18772141/cf2a821b258a3f68a79ae7b26b85ad01-400x400nocrop.jpeg" };
    
    let basket = [];
    let selectedDrink = null;

    function init() {
        tg.expand();
        document.getElementById('grid').innerHTML = `
            <div class="card" onclick="openModal()">
                <img src="${product.i}">
                <div class="price">${product.p} ₽</div>
                <div class="name">${product.n}</div>
            </div>`;
    }

    function openModal() {
        selectedDrink = null;
        document.getElementById('m-img').src = product.i;
        document.getElementById('m-title').innerText = product.n;
        document.getElementById('m-price').innerText = product.p;
        
        document.getElementById('drink-list').innerHTML = drinks.map(d => `
            <div class="row-item" onclick="selectDrink(this, '${d.n}')">
                <div class="row-left"><img class="row-img" src="${d.i}"><div class="row-text">${d.n}</div></div>
                <div class="radio"></div>
            </div>
        `).join('');

        document.getElementById('modal-overlay').style.display = 'block';
        setTimeout(() => document.getElementById('modal').style.transform = 'translateY(0)', 10);
    }

    function selectDrink(el, name) {
        document.querySelectorAll('#drink-list .row-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedDrink = name;
        if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
    }

    function closeModal() {
        document.getElementById('modal').style.transform = 'translateY(100%)';
        setTimeout(() => document.getElementById('modal-overlay').style.display = 'none', 300);
    }

    function addToBasket() {
        if (!selectedDrink) {
            tg.showAlert("Пожалуйста, выберите напиток");
            return;
        }
        
        basket.push({ name: product.n, drink: selectedDrink, price: product.p });
        updateCartUI();
        closeModal();
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function updateCartUI() {
        const cartFloat = document.getElementById('cart-float');
        if (basket.length > 0) {
            const total = basket.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = total + " ₽";
            cartFloat.style.display = 'flex';
        } else {
            cartFloat.style.display = 'none';
        }
    }

    function sendOrder() {
        const orderData = {
            order: basket.map(item => `${item.name} (${item.drink})`),
            total: basket.reduce((sum, item) => sum + item.price, 0)
        };
        tg.sendData(JSON.stringify(orderData));
    }

    init();
</script>
</body>
</html>
