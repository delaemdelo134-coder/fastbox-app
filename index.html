<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rostic's Syzran Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #191918;
            --card: #242423;
            --red: #e41c2d;
            --text: #ffffff;
            --gray: #9e9e9e;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding-bottom: 120px;
            user-select: none;
        }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d2c; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .logo { color: var(--red); font-weight: 900; font-size: 22px; }
        .city { font-size: 10px; color: var(--gray); border: 1px solid #333; padding: 3px 8px; border-radius: 10px; }

        .category-title { padding: 20px 15px 10px; font-size: 22px; font-weight: 800; color: #fff; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
        .card { background: var(--card); border-radius: 20px; padding: 12px; display: flex; flex-direction: column; }
        
        .img-c { width: 100%; aspect-ratio: 1/1; border-radius: 12px; overflow: hidden; margin-bottom: 10px; background: #111; }
        .img-c img { width: 100%; height: 100%; object-fit: cover; }

        .price { font-size: 19px; font-weight: 800; margin-bottom: 4px; }
        .name { font-size: 13px; color: #ccc; height: 32px; line-height: 1.2; overflow: hidden; margin-bottom: 4px; }
        .desc { font-size: 10px; color: var(--gray); height: 24px; overflow: hidden; margin-bottom: 10px; line-height: 1.1; }

        .btn { 
            background: #333; color: var(--text); border: none; border-radius: 12px; 
            padding: 10px; font-weight: 700; font-size: 16px; cursor: pointer;
        }
        .btn:active { background: var(--red); transform: scale(0.96); }

        .cart-btn { 
            position: fixed; bottom: 20px; left: 15px; right: 15px; 
            background: var(--red); color: #fff; padding: 18px; 
            border-radius: 18px; display: none; justify-content: space-between; 
            font-weight: 800; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">ROSTIC'S</div>
    <div class="city">СЫЗРАНЬ</div>
</div>

<div id="content"></div>

<div class="cart-btn" id="cart" onclick="sendOrder()">
    <span id="total">0</span> ₽
    <span>ЗАКАЗАТЬ →</span>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#191918';

    // База данных товаров
    const products = [
        { 
            cat: "Комбо и Ланчи", 
            n: "Комбо с Креветками", 
            p: 556, 
            d: "Фри + 6 Креветок + Напиток 0.4", 
            i: "https://eda.yandex/images/18772141/cf2a821b258a3f68a79ae7b26b85ad01-400x400nocrop.jpeg" 
        },
        { 
            cat: "Популярное", 
            n: "Пара: 2 Ростмастера", 
            p: 499, 
            d: "Выгодное предложение для двоих", 
            i: "https://eda.yandex/images/19925171/5614056a885e81985bbb02a2b9c9b6e6-400x400nocrop.jpeg" 
        }
    ];

    let basket = [];

    function render() {
        const content = document.getElementById('content');
        const categories = [...new Set(products.map(p => p.cat))];
        
        content.innerHTML = categories.map(cat => `
            <div class="category-title">${cat}</div>
            <div class="grid">
                ${products.filter(p => p.cat === cat).map((p, i) => {
                    // Находим реальный индекс в общем массиве
                    const realIndex = products.findIndex(pr => pr.n === p.n);
                    return `
                    <div class="card">
                        <div class="img-c"><img src="${p.i}"></div>
                        <div class="price">${p.p} ₽</div>
                        <div class="name">${p.n}</div>
                        <div class="desc">${p.d}</div>
                        <button class="btn" onclick="add(${realIndex})">В корзину</button>
                    </div>`;
                }).join('')}
            </div>
        `).join('');
    }

    function add(i) {
        basket.push(products[i]);
        const sum = basket.reduce((a, b) => a + b.p, 0);
        document.getElementById('total').innerText = sum;
        document.getElementById('cart').style.display = 'flex';
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function sendOrder() {
        const order = {
            items: basket.map(x => x.n),
            total: basket.reduce((a, b) => a + b.p, 0)
        };
        tg.sendData(JSON.stringify(order));
    }

    render();
</script>

</body>
</html>
