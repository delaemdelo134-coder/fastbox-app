<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 15px; }
        .header { text-align: center; margin-bottom: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color); border-radius: 12px; padding: 10px; margin-bottom: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .card-info { flex-grow: 1; }
        .title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .price { color: #31b545; font-weight: bold; }
        .btn { background: #31b545; color: white; border: none; border-radius: 6px; padding: 8px 15px; cursor: pointer; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">
        <h2>FastBox Сызрань 📦</h2>
        <p>Выберите товары</p>
    </div>

    <div class="card">
        <img src="https://rostics.ru/images/products/6-classic-nuggets.png" alt="Rostic's">
        <div class="card-info">
            <div class="title">Наггетсы Rostic's</div>
            <div class="price">149₽</div>
        </div>
        <button class="btn" onclick="sendData('Наггетсы')">🛍</button>
    </div>

    <div class="card">
        <img src="https://img.freepik.com/free-photo/flower-bouquet-delivery_23-2148819543.jpg" alt="Flowers">
        <div class="card-info">
            <div class="title">Букет "Весна"</div>
            <div class="price">1500₽</div>
        </div>
        <button class="btn" onclick="sendData('Букет')">🛍</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function sendData(item) {
            tg.sendData("Выбран товар: " + item); // Отправляет данные боту
            tg.close(); // Закрывает приложение после выбора
        }
    </script>
</body>
</html>
