<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #e4002b; --tg-bg: var(--tg-theme-bg-color, #ffffff); --tg-text: var(--tg-theme-text-color, #222222); --sec-bg: var(--tg-theme-secondary-bg-color, #f5f5f5); }
        body { font-family: -apple-system, sans-serif; background-color: var(--tg-bg); color: var(--tg-text); margin: 0; padding: 0; overflow-x: hidden; }
        
        .page { display: none; padding: 15px; padding-bottom: 90px; }
        .page.active { display: block; }

        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid var(--sec-bg); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; position: relative; }
        .header h2 { margin: 0; color: var(--main-color); font-size: 16px; text-transform: uppercase; }
        .back-btn { position: absolute; left: 10px; background: none; border: none; font-size: 24px; color: var(--main-color); cursor: pointer; }

        /* Категории */
        .cat-scroll { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding: 5px 0; scrollbar-width: none; }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-btn { padding: 8px 16px; background: var(--sec-bg); border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; border: none; color: var(--tg-text); font-weight: 600; }
        .cat-btn.active { background: var(--main-color); color: white; }

        /* Карточки */
        .items-list { display: grid; gap: 10px; }
        .card { background: var(--sec-bg); border-radius: 18px; padding: 12px; display: flex; align-items: center; }
        .card img { width: 75px; height: 75px; border-radius: 12px; margin-right: 12px; object-fit: cover; background: white; }
        .card-info { flex-grow: 1; }
        .card-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; line-height: 1.2; }
        .card-price { color: var(--main-color); font-weight: 800; font-size: 15px; }
        .add-btn { background: var(--main-color); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Главный экран */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .main-tile { background: var(--sec-bg); border-radius: 24px; padding: 20px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; aspect-ratio: 1/1; justify-content: center; }
        .main-tile i { font-size: 40px; margin-bottom: 8px; }
        .main-tile span { font-weight: 800; font-size: 11px; color: var(--tg-text); }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--sec-bg); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(0,0,0,0.05); }
        .tab-item { text-align: center; font-size: 10px; color: var(--tg-theme-hint-color); cursor: pointer; flex: 1; font-weight: 500; }
        .tab-item.active { color: var(--main-color); }
    </style>
</head>
<body>

    <div id="main-page" class="page active">
        <div class="header"><h2>FASTBOX СЫЗРАНЬ</h2></div>
        <div class="main-grid">
            <div class="main-tile" onclick="showPage('vendors-page')"><i>🍔</i><span>ЕДА И ПРОДУКТЫ</span></div>
            <div class="main-tile" onclick="showPage('flowers-page')"><i>💐</i><span>ЦВЕТЫ (ПАРТНЕРЫ)</span></div>
            <div class="main-tile" onclick="showPage('profile-page')"><i>👤</i><span>КАБИНЕТ</span></div>
            <div class="main-tile" onclick="showPage('support-page')"><i>🆘</i><span>ПОДДЕРЖКА</span></div>
        </div>
    </div>

    <div id="vendors-page" class="page">
        <div class="header"><button class="back-btn" onclick="showPage('main-page')">‹</button><h2>МАГАЗИНЫ</h2></div>
        <div class="card" onclick="showPage('rostics-page')" style="cursor:pointer">
            <img src="https://rostics.ru/images/static/favicon.ico">
            <div class="card-info"><div class="card-title">Rostic's (Ростикс)</div><div style="font-size:11px; color:gray">Курица, бургеры, боксы</div></div>
            <div style="color:var(--main-color); font-weight:bold;">➜</div>
        </div>
    </div>

    <div id="rostics-page" class="page">
        <div class="header"><button class="back-btn" onclick="showPage('vendors-page')">‹</button><h2>МЕНЮ ROSTIC'S</h2></div>
        
        <div class="cat-scroll">
            <button class="cat-btn active" onclick="filterMenu('all', this)">Все</button>
            <button class="cat-btn" onclick="filterMenu('combo', this)">🔥 Комбо</button>
            <button class="cat-btn" onclick="filterMenu('burgers', this)">🍔 Бургеры</button>
            <button class="cat-btn" onclick="filterMenu('chicken', this)">🍗 Курица</button>
            <button class="cat-btn" onclick="filterMenu('drinks', this)">🥤 Напитки</button>
        </div>

        <div id="menu-container" class="items-list"></div>
    </div>

    <div id="support-page" class="page">
        <div class="header"><h2>ПОДДЕРЖКА</h2></div>
        <div style="text-align:center; padding:20px;">
            <p>Есть вопросы по заказу в Сызрани? Нажмите кнопку ниже, чтобы связаться с оператором FastBox.</p>
            <button class="cat-btn active" style="width:100%; padding:15px; font-size:14px;" onclick="sendSupport()">Связаться с оператором</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="showPage('main-page')">🏠<br>ГЛАВНАЯ</div>
        <div class="tab-item" onclick="showPage('support-page')">💬<br>ЧАТ</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let cart = [];
        let total = 0;

        tg.expand();

        const menuData = [
            // КОМБО
            { cat: 'combo', name: "Комбо с Шефбургером", price: 299, img: "https://rostics.ru/images/products/Combo_Chefburger_Classic.png" },
            { cat: 'combo', name: "Комбо с Твистером", price: 329, img: "https://rostics.ru/images/products/Combo_Twister_Classic.png" },
            { cat: 'combo', name: "Бокс 5 за 200", price: 200, img: "https://rostics.ru/images/products/box_5_for_200.png" },
            { cat: 'combo', name: "Комбо с Боксмастером", price: 389, img: "https://rostics.ru/images/products/Combo_Boxmaster.png" },

            // БУРГЕРЫ
            { cat: 'burgers', name: "Шефбургер Делюкс", price: 199, img: "https://rostics.ru/images/products/chefburger_deluxe_classic.png" },
            { cat: 'burgers', name: "Боксмастер Классик", price: 279, img: "https://rostics.ru/images/products/boxmaster_classic.png" },
            { cat: 'burgers', name: "Твистер Классик", price: 199, img: "https://rostics.ru/images/products/twister_classic.png" },
            { cat: 'burgers', name: "Лонгер", price: 79, img: "https://rostics.ru/images/products/longer.png" },

            // КУРИЦА
            { cat: 'chicken', name: "Баскет Дуэт", price: 499, img: "https://rostics.ru/images/products/basket_duet.png" },
            { cat: 'chicken', name: "Острые крылья (5 шт)", price: 189, img: "https://rostics.ru/images/products/wings_5.png" },
            { cat: 'chicken', name: "Наггетсы (12 шт)", price: 259, img: "https://rostics.ru/images/products/12_nuggets.png" },
            { cat: 'chicken', name: "Стрипсы (3 шт)", price: 139, img: "https://rostics.ru/images/products/strips_3.png" },
            { cat: 'chicken', name: "Ножки (2 шт)", price: 179, img: "https://rostics.ru/images/products/legs_2.png" },

            // НАПИТКИ
            { cat: 'drinks', name: "Добрый Кола 0.5", price: 119, img: "https://rostics.ru/images/products/cola_05.png" },
            { cat: 'drinks', name: "Кофе Капучино 0.3", price: 109, img: "https://rostics.ru/images/products/cappuccino_03.png" },
            { cat: 'drinks', name: "Чай черный 0.3", price: 79, img: "https://rostics.ru/images/products/tea_black.png" }
        ];

        function renderMenu(filter = 'all') {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            menuData.forEach(item => {
                if (filter === 'all' || item.cat === filter) {
                    container.innerHTML += `
                        <div class="card">
                            <img src="${item.img}">
                            <div class="card-info">
                                <div class="card-title">${item.name}</div>
                                <div class="card-price">${item.price}₽</div>
                            </div>
                            <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+</button>
                        </div>`;
                }
            });
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMenu(cat);
            tg.HapticFeedback.impactOccurred('light');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            tg.HapticFeedback.impactOccurred('medium');
            if (pageId === 'main-page') tg.MainButton.hide();
        }

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            tg.MainButton.setText(`ОФОРМИТЬ ЗАКАЗ: ${total}₽`);
            tg.MainButton.setParams({color: "#e4002b"});
            tg.MainButton.show();
            tg.HapticFeedback.notificationOccurred('success');
        }

        tg.onEvent('mainButtonClicked', function() {
            tg.sendData(JSON.stringify({items: cart, total: total, type: 'order'}));
            tg.close();
        });

        function sendSupport() {
            tg.sendData(JSON.stringify({type: 'support', text: 'Нужна помощь оператора'}));
            tg.close();
        }

        renderMenu();
    </script>
</body>
</html>
