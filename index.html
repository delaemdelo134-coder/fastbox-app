<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastBox Black Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #FFCC00; --dark-bg: #000000; --card-bg: #1C1C1E;
            --text-main: #FFFFFF; --text-sub: #8E8E93; --tab-bar-bg: #161618;
            --ros-red: #e41c2d; --ros-bg: #ffffff;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0;
            background-color: var(--dark-bg); color: var(--text-main);
            -webkit-font-smoothing: antialiased; padding-bottom: 90px; overflow-x: hidden;
        }
        /* ШАПКА */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #2C2C2E; height: 65px; box-sizing: border-box;
        }
        .brand { font-weight: 800; font-size: 18px; }
        .brand span { color: var(--accent); }
        .back-btn { display: none; color: var(--accent); cursor: pointer; font-size: 16px; font-weight: 600; }
        .balance-badge { background: #2C2C2E; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--accent); }

        .content-page { display: none; animation: fadeIn 0.3s ease; }
        .content-page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* НОВОСТИ */
        .news-section { padding: 15px 0 15px 20px; }
        .news-container { display: flex; overflow-x: auto; gap: 12px; padding-right: 20px; scrollbar-width: none; }
        .news-item { 
            flex: 0 0 130px; height: 170px; border-radius: 22px; 
            background-size: cover; background-position: center; border: 1px solid #2C2C2E;
            background-image: url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400');
        }

        /* МЕНЮ */
        .menu-container { padding: 0 20px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu-item { background: var(--card-bg); border-radius: 24px; padding: 20px; border: 1px solid #2C2C2E; display: flex; flex-direction: column; cursor: pointer; }
        .menu-item .icon { font-size: 32px; margin-bottom: 10px; }

        /* СПИСКИ ЗАВЕДЕНИЙ */
        .grid-list { padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .card-item { background: var(--card-bg); border-radius: 18px; padding: 12px; text-align: center; border: 1px solid #2C2C2E; cursor: pointer; }
        .card-logo { width: 55px; height: 55px; border-radius: 12px; margin-bottom: 8px; object-fit: contain; background: #fff; }

        /* КОЛЕСО */
        .wheel-box { background: var(--card-bg); margin: 0 20px 20px; padding: 25px 20px; border-radius: 28px; border: 1px solid #2C2C2E; text-align: center; }
        .wheel-container { position: relative; width: 180px; height: 180px; margin: 0 auto 15px; }
        .wheel-img { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; border: 4px solid var(--accent); }
        .wheel-btn { background: var(--accent); color: #000; border: none; width: 100%; padding: 14px; border-radius: 14px; font-weight: 900; }

        /* ТАБ-БАР */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: var(--tab-bar-bg); border-top: 1px solid #2C2C2E; display: flex; justify-content: space-around; align-items: center; padding-bottom: 15px; z-index: 1000; }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--text-sub); font-size: 10px; font-weight: 600; cursor: pointer; }
        .tab-item.active { color: var(--accent); }

        /* КНОПКА ПОДДЕРЖКИ */
        .support-btn { background: var(--accent); color: #000; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: 900; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-btn" id="back-btn" onclick="goBack()">← Назад</div>
        <div class="brand" id="header-brand">FastBox <span>BLACK</span></div>
        <div class="balance-badge">💎 <span id="balance-val">550</span> FC</div>
    </div>

    <div id="page-main" class="content-page active">
        <div class="news-section">
            <div class="news-container">
                <div class="news-item"></div>
                <div class="news-item" style="background-image: url('https://images.unsplash.com/photo-1549465220-1a8b9238cd48?w=400')"></div>
            </div>
        </div>
        <div class="menu-container">
            <div class="menu-item" style="grid-column: span 2;" onclick="openCategory('restaurants')"><div class="icon">🍱</div><div style="font-weight:800;">Рестораны и Еда</div></div>
            <div class="menu-item" onclick="openCategory('pharmacy')"><div class="icon">🚑</div><div style="font-weight:800;">Аптеки</div></div>
            <div class="menu-item" onclick="openCategory('flowers')"><div class="icon">🎁</div><div style="font-weight:800;">Цветы</div></div>
        </div>
    </div>

    <div id="page-restaurants" class="content-page">
        <div style="padding: 15px 20px; font-weight: 700; color: var(--text-sub); font-size: 13px;">ЕДА В СЫЗРАНИ</div>
        <div class="grid-list">
            <div class="card-item" onclick="tg.showAlert('Меню Ростикс загружается...')">
                <img src="channels4_profile.jpg" class="card-logo" onerror="this.src='https://upload.wikimedia.org/wikipedia/ru/thumb/e/e3/Rostic%27s_logo.svg/1200px-Rostic%27s_logo.svg.png'">
                <div style="font-size:10px; font-weight:700;">ROSTIC'S</div>
            </div>
        </div>
    </div>

    <div id="page-pharmacy" class="content-page">
        <div style="padding: 15px 20px; font-weight: 700; color: var(--text-sub); font-size: 13px;">АПТЕКИ</div>
        <div class="grid-list">
            <div class="card-item" onclick="tg.showAlert('Выбор лекарств скоро!')">
                <img src="https://vitasite.ru/upload/iblock/88b/88b178494b288a442e3933c091d31065.png" class="card-logo">
                <div style="font-size:10px; font-weight:700;">ВИТА</div>
            </div>
        </div>
    </div>

    <div id="page-flowers" class="content-page">
        <div style="padding: 15px 20px; font-weight: 700; color: var(--text-sub); font-size: 13px;">ЦВЕТЫ</div>
        <div class="grid-list">
            <div class="card-item" onclick="tg.showAlert('Букеты скоро!')">
                <div class="card-logo" style="display:flex; align-items:center; justify-content:center; background:#222; font-size:24px;">🌹</div>
                <div style="font-size:10px; font-weight:700;">МИР ЦВЕТОВ</div>
            </div>
        </div>
    </div>

    <div id="page-cabinet" class="content-page">
        <div style="background: linear-gradient(135deg, #1C1C1E 0%, #080808 100%); border-radius: 24px; padding: 20px; margin: 15px 20px; border: 1px solid #2C2C2E; display: flex; align-items: center; gap: 15px;">
            <div id="user-letter" style="width:50px; height:50px; background:var(--accent); border-radius:15px; color:#000; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:20px;">?</div>
            <div>
                <div id="user-full-name" style="font-weight:800; font-size:18px;">Загрузка...</div>
                <div style="font-size:10px; color:var(--accent); font-weight:700;">FASTBOX BLACK MEMBER</div>
            </div>
        </div>

        <div class="wheel-box">
            <div style="font-weight:900; margin-bottom:15px;">УДАЧА FASTBOX 🎡</div>
            <div class="wheel-container">
                <img src="https://cdn-icons-png.flaticon.com/512/8155/8155455.png" style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:30px; z-index:10;">
                <img id="wheel-img" class="wheel-img" src="https://cdn-icons-png.flaticon.com/512/610/610106.png">
            </div>
            <button class="wheel-btn" id="spin-btn" onclick="spinWheel()">ИСПЫТАТЬ УДАЧУ</button>
        </div>
    </div>

    <div id="page-support" class="content-page">
        <div style="padding:40px 20px; text-align:center;">
            <div style="width:80px; height:80px; background:var(--card-bg); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:35px; border:2px solid var(--accent); margin: 0 auto;">🎧</div>
            <h2 style="margin-top:20px;">Сызрань на связи</h2>
            <p style="color:var(--text-sub); font-size:13px;">Операторы FastBox помогут с заказом</p>
            <button class="support-btn" onclick="tg.showAlert('Переход в чат...')">ЧАТ С ОПЕРАТОРОМ</button>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab(this, 'main')"><span>🏠</span><span>Главная</span></div>
        <div class="tab-item" onclick="switchTab(this, 'cabinet')"><span>👤</span><span>Кабинет</span></div>
        <div class="tab-item" onclick="switchTab(this, 'support')"><span>🆘</span><span>Помощь</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function initUser() {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('user-full-name').innerText = user.first_name || 'Клиент';
                document.getElementById('user-letter').innerText = (user.first_name ? user.first_name[0] : 'U').toUpperCase();
            }
        }
        initUser();

        let navStack = ['main'];

        function showPage(id) {
            document.querySelectorAll('.content-page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + id);
            if(target) target.classList.add('active');
            
            const isRoot = ['main', 'cabinet', 'support'].includes(id);
            document.getElementById('back-btn').style.display = isRoot ? 'none' : 'block';
            document.getElementById('header-brand').style.display = isRoot ? 'block' : 'none';
        }

        function openCategory(cat) { navStack.push(cat); showPage(cat); }
        
        function goBack() { 
            if(navStack.length > 1) { 
                navStack.pop(); 
                showPage(navStack[navStack.length-1]); 
            } 
        }

        function switchTab(el, id) { 
            document.querySelectorAll('.tab-bar .tab-item').forEach(t => t.classList.remove('active')); 
            el.classList.add('active'); 
            navStack = [id]; 
            showPage(id);
            tg.HapticFeedback.impactOccurred('light');
        }

        function spinWheel() {
            const btn = document.getElementById('spin-btn');
            const wheel = document.getElementById('wheel-img');
            btn.disabled = true;
            const deg = Math.floor(Math.random() * 360) + 1800;
            wheel.style.transform = `rotate(${deg}deg)`;
            tg.HapticFeedback.impactOccurred('medium');
            setTimeout(() => {
                tg.showAlert('Вы выиграли скидку 5%! Ваша удача сегодня на высоте.');
            }, 4100);
        }
    </script>
</body>
</html>
