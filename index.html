<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Используем CDN сервер, который обычно разрешен для мобильных приложений
    const imgBase = "https://s82079.cdn.ngenix.net/295x0/";

    const products = [
        // 🔥 АКЦИИ И ПАРЫ
        { cat: 'promo', name: "2 Азиатских Ролла (креветки)", price: 584, img: "0u672v795u2z0886m84q992f0380" },
        { cat: 'promo', name: "2 Азиатских Бургера", price: 517, img: "mx774u98z58f8u9f09q552f0402" },
        { cat: 'promo', name: "2 Ростмастера Чиз", price: 845, img: "7t211f420u3f098j09q332f0120" },
        { cat: 'promo', name: "2 Маэстро Бургера", price: 462, img: "9u341f595u2z0986m84q992f0220" },

        // 🍱 ЛАНЧИ И КОМБО
        { cat: 'combo', name: "ЛанчБаскет 5 за 450", price: 450, img: "wy642998f58u9y98j4q6639d0456" },
        { cat: 'combo', name: "ЛанчБаскет 5 за 350", price: 350, img: "mx774u98z58f8u9f09q552f0402" },
        { cat: 'combo', name: "Комбо с Ростмастером", price: 452, img: "7t211f420u3f098j09q332f0120" },

        // 🍔 БУРГЕРЫ И РОЛЛЫ
        { cat: 'burgers', name: "Двойной Азия Краб Бургер", price: 515, img: "8u451f615u2z0986m84q992f0330" },
        { cat: 'burgers', name: "Азия Бургер", price: 291, img: "5u671f815u2z0986m84q992f0880" },
        { cat: 'burgers', name: "Маэстро Блю Чиз", price: 488, img: "9u341f595u2z0986m84q992f0990" },
        { cat: 'burgers', name: "Шефбургер оригинальный", price: 190, img: "1u221f335u2z0986m84q992f0110" },

        // 🍗 БАСКЕТЫ
        { cat: 'chicken', name: "Баскет L (24 Крыла)", price: 870, img: "7t411f520u3f098j09q332f0550" },
        { cat: 'chicken', name: "Мой Баскет с ножками", price: 216, img: "mx774u98z58f8u9f09q552f0402" },

        // 🥤 НАПИТКИ
        { cat: 'drinks', name: "Эвервесс Кола 0.5 л", price: 147, img: "1u221f335u2z0986m84q992f0110" },
        { cat: 'drinks', name: "Бабл Ти Зеленый Lipton", price: 291, img: "0u672v795u2z0886m84q992f0380" },

        // 🍰 ДЕСЕРТЫ
        { cat: 'desserts', name: "Чизкейк с карамелью", price: 277, img: "9u341f595u2z0986m84q992f0990" },
        { cat: 'desserts', name: "Пирожок с вишней", price: 83, img: "7t211f420u3f098j09q332f0120" }
    ];

    let cart = [];

    function render(f = 'all') {
        const m = document.getElementById('menu');
        m.innerHTML = '';
        products.forEach(p => {
            if(f === 'all' || p.cat === f) {
                const c = document.createElement('div');
                c.className = 'card';
                // onerror позволяет подставить пустую картинку, если ссылка не сработала
                c.innerHTML = `
                    <img src="${imgBase + p.img}" alt="" onerror="this.src='https://via.placeholder.com/150?text=Rostics'">
                    <div class="price">${p.price} ₽</div>
                    <div class="name">${p.name}</div>
                    <button class="btn-add" onclick="buy('${p.name}', ${p.price})">+</button>
                `;
                m.appendChild(c);
            }
        });
    }

    function filter(cat, btn) {
        document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(cat);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function buy(n, p) {
        cart.push({n, p});
        const total = cart.reduce((s, i) => s + i.p, 0);
        document.getElementById('total').innerText = total;
        document.getElementById('cartBar').style.display = 'flex';
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }

    function sendOrder() {
        const data = {
            items: cart.map(i => i.n),
            total: cart.reduce((s, i) => s + i.p, 0)
        };
        tg.sendData(JSON.stringify(data));
        tg.close();
    }

    render();
</script>
